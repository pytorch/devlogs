{{ define "main" }}
  <nav class="breadcrumb">
    <a href="{{ .Site.BaseURL }}">All Posts</a> / <a href="{{ .FirstSection.Permalink }}">{{ .FirstSection.Title }}</a>
  </nav>
  <article>
    <h1>{{ .Title }}</h1>
    <div class="meta">
      {{ with .Params.author }}{{ . }} · {{ end }}
      {{ .Date.Format "January 2, 2006" }}
      {{ with .ReadingTime }} · {{ . }} min read{{ end }}
      {{ with .Params.tags }}
        <br>
        {{ range . }}<span class="tag">{{ . }}</span>{{ end }}
      {{ end }}
    </div>
    {{ .Content }}
  </article>
{{ end }}
