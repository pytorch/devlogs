{{ define "main" }}
  {{ if .IsHome }}
    {{ .Content }}

    <h2>Topics</h2>
    <ul class="post-list">
      {{ range .Site.Sections }}
        <li><a href="{{ .Permalink }}">{{ .Title }}</a> <span class="date">· {{ len .Pages }} posts</span></li>
      {{ end }}
    </ul>
  {{ else }}
    <h1>{{ .Title }}</h1>
    <ul class="post-list">
      {{ range .Pages.ByDate.Reverse }}
        <li>
          <span class="date">{{ .Date.Format "2006-01-02" }}</span>
          <a href="{{ .Permalink }}">{{ .Title }}</a>
        </li>
      {{ end }}
    </ul>
  {{ end }}
{{ end }}
