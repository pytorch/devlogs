name: Lint devlog posts

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
  pull_request:
    paths:
      - 'content/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check content files
        run: |
          errors=0

          # Check for missing .md extension
          for f in $(find content -type f -not -name '_index.md' -not -name '*.md'); do
            echo "::error file=$f::Missing .md extension"
            errors=$((errors + 1))
          done

          # Check frontmatter on all posts
          for f in $(find content -type f -name '*.md' -not -name '_index.md'); do
            # Check for opening and closing ---
            if ! head -1 "$f" | grep -q '^---'; then
              echo "::error file=$f::Missing frontmatter (no opening ---)"
              errors=$((errors + 1))
              continue
            fi
            # Find closing --- (line 2+)
            closing=$(tail -n +2 "$f" | grep -n '^---' | head -1 | cut -d: -f1)
            if [ -z "$closing" ]; then
              echo "::error file=$f::Missing frontmatter closing ---"
              errors=$((errors + 1))
              continue
            fi
            # Extract frontmatter
            fm=$(head -n $((closing + 1)) "$f")
            if ! echo "$fm" | grep -q '^title:'; then
              echo "::error file=$f::Missing 'title' in frontmatter"
              errors=$((errors + 1))
            fi
            if ! echo "$fm" | grep -q '^date:'; then
              echo "::error file=$f::Missing 'date' in frontmatter"
              errors=$((errors + 1))
            fi
            if ! echo "$fm" | grep -q '^author:'; then
              echo "::error file=$f::Missing 'author' in frontmatter"
              errors=$((errors + 1))
            else
              # Check that every author has a (@username)
              author_line=$(echo "$fm" | grep '^author:' | sed 's/^author: *"*//' | sed 's/"*$//')
              IFS=',' read -ra authors <<< "$author_line"
              for author in "${authors[@]}"; do
                author=$(echo "$author" | xargs)
                if [ -n "$author" ] && ! echo "$author" | grep -qE '\(@?[a-zA-Z0-9_-]+\)'; then
                  echo "::warning file=$f::Author '$author' is missing a GitHub handle, e.g. Name (@username). Adding a GitHub handle is recommended for giscus comment notifications."
                fi
              done
            fi
          done

          # Check image references in posts
          for f in $(find content -type f -name '*.md' -not -name '_index.md'); do
            topic=$(echo "$f" | cut -d/ -f2)
            for src in $(grep -oE '!\[[^]]*\]\([^)]+\)' "$f" | sed 's/.*(\(.*\))/\1/'); do
              if ! echo "$src" | grep -qE '^/devlogs/images/'; then
                echo "::error file=$f::Image '$src' should use path /devlogs/images/<topic>/filename.png"
                errors=$((errors + 1))
              else
                local_path="static${src#/devlogs}"
                if [ ! -f "$local_path" ]; then
                  echo "::error file=$f::Image '$src' not found at $local_path"
                  errors=$((errors + 1))
                fi
                img_topic=$(echo "$src" | cut -d/ -f4)
                if [ "$img_topic" != "$topic" ]; then
                  echo "::warning file=$f::Image '$src' is in '$img_topic/' but post is in '$topic/'"
                fi
              fi
            done
          done

          # Check for images incorrectly placed in content/
          for img in $(find content -type f \( -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o -name '*.gif' -o -name '*.svg' -o -name '*.webp' \) 2>/dev/null); do
            echo "::error file=$img::Images should be in static/images/<topic>/, not in content/"
            errors=$((errors + 1))
          done

          # Check for sections missing _index.md
          for dir in content/*/; do
            if [ ! -f "${dir}_index.md" ]; then
              echo "::error::Section ${dir} is missing _index.md"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo ""
            echo "Found $errors error(s). See template.md for the expected format."
            exit 1
          fi
          echo "All checks passed."
