<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <style>
    :root { --accent: #2563eb; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #24292e; }
    .site-header { border-bottom: 3px solid var(--accent); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
    .site-header a { color: var(--accent); text-decoration: none; font-weight: 600; font-size: 1.4rem; }
    .site-header nav a { font-size: 0.9rem; margin-left: 1.5rem; color: #586069; }
    .site-header nav a:hover { color: var(--accent); }
    .wrapper { display: flex; max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; gap: 2rem; }
    .sidebar { width: 250px; flex-shrink: 0; font-size: 0.85rem; position: sticky; top: 2rem; align-self: flex-start; max-height: calc(100vh - 4rem); overflow-y: auto; }
    .sidebar h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #586069; margin: 1.2rem 0 0.4rem; }
    .sidebar ul { list-style: none; margin: 0; padding: 0; }
    .sidebar li { padding: 0.25rem 0; }
    .sidebar a { color: #24292e; text-decoration: none; }
    .sidebar a:hover { color: var(--accent); }
    .sidebar .active { color: var(--accent); font-weight: 600; }
    .content { flex: 1; min-width: 0; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
    h2 { font-size: 1.4rem; margin: 2rem 0 1rem; border-bottom: 1px solid #e1e4e8; padding-bottom: 0.3rem; }
    h3 { font-size: 1.1rem; margin: 1.5rem 0 0.5rem; }
    p { margin-bottom: 1rem; }
    a { color: var(--accent); }
    img { max-width: 100%; height: auto; border-radius: 4px; margin: 1rem 0; }
    pre { background: #f6f8fa; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 1rem 0; }
    code { font-size: 0.9em; }
    blockquote { border-left: 4px solid var(--accent); padding-left: 1rem; margin: 1rem 0; color: #586069; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #e1e4e8; padding: 0.5rem 0.75rem; text-align: left; }
    th { background: #f6f8fa; }
    ul, ol { margin: 0.5rem 0 1rem 1.5rem; }
    .meta { color: #586069; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .tag { display: inline-block; background: #eff6ff; color: var(--accent); padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.8rem; margin-right: 0.3rem; }
    .post-list { list-style: none; margin: 0; padding: 0; }
    .post-list li { padding: 0.75rem 0; border-bottom: 1px solid #f0f0f0; }
    .post-list .date { color: #586069; font-size: 0.85rem; min-width: 6rem; display: inline-block; }
    footer { margin-top: 3rem; padding: 1rem 2rem; border-top: 1px solid #e1e4e8; color: #586069; font-size: 0.85rem; text-align: center; }
    @media (max-width: 768px) {
      .wrapper { flex-direction: column; }
      .sidebar { width: 100%; position: static; max-height: none; border-bottom: 1px solid #e1e4e8; padding-bottom: 1rem; margin-bottom: 1rem; }
    }
  </style>
</head>
<body>
  <div class="site-header">
    <a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>
    <nav>
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
  <div class="wrapper">
    <aside class="sidebar">
      {{ range .Site.Sections }}
        {{ if .Pages }}
          <h3>{{ .Title }}</h3>
          <ul>
            {{ range .Pages.ByDate.Reverse }}
              <li><a href="{{ .Permalink }}"{{ if eq $.RelPermalink .RelPermalink }} class="active"{{ end }}>{{ .Title }}</a></li>
            {{ end }}
          </ul>
        {{ end }}
      {{ end }}
    </aside>
    <div class="content">
      {{ block "main" . }}{{ end }}
    </div>
  </div>
  <footer>
    <p>PyTorch Contributors · <a href="https://github.com/pytorch/devlogs">Source</a></p>
  </footer>
</body>
</html>
